[options]
Architecture = i686
ParallelDownloads = 25
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Server = https://mirror.archlinux32.org/i686/$repo

[extra]
Server = https://mirror.archlinux32.org/i686/$repo

[community]
Server = https://mirror.archlinux32.org/i686/$repo

[acreetionOSREPO-main]
SigLevel = Optional
Server = https://iso.acreetionos.org:8448/repo-main/i686
