stages:
  - build
  - release

variables:
  ARCH: "x86_64"
  CI_COMMIT_MESSAGE: "${CI_COMMIT_MESSAGE}"
  FF_USE_FASTZIP: "true"
  TRANSFER_METER_FREQUENCY: "5s"
  SKIP_TERMS: "1"
  OUTPUT_DIR: "ISO"

# Define pipeline schedules via GitLab CI
# - Weekly: 0 0 * * 0 (Sunday at 00:00 UTC)
# - On release tags: when: manual

build:x86_64:
  stage: build
  image: archlinux:latest
  tags:
    - docker
    - linux
  timeout: 2h
  
  before_script:
    - echo "Setting up Arch Linux build environment..."
    - pacman -Syu --noconfirm
    - pacman -S --noconfirm base-devel archiso git submodules bc p7zip sudo
    - git submodule update --init --recursive
    # Recompile wrapper to ensure compatibility
    - gcc -O3 mkarchiso.c -o mkarchiso_wrapper
    - chmod +x mkarchiso_wrapper
  
  script:
    - echo "Building AcreetionOS MATE for ${ARCH}..."
    - mkdir -p ${OUTPUT_DIR}
    - chmod +x ./build-mate.sh
    - chmod +x ./generate-build-info.sh
    - chmod +x ./generate-build-version.sh
    - chmod +x ./validate-build.sh
    
    # 1. Validation & Security Gate
    - echo "🔒 Running security validation..."
    - ./validate-build.sh
    - |
      if grep -q "cinnamon\|nemo\|muffin\|gnome-terminal" packages.x86_64; then
        echo "❌ SECURITY: Found conflicting packages (Cinnamon/GNOME)"
        exit 1
      fi
    
    # 2. Generate versioning info
    - ./generate-build-version.sh
    
    # 3. Run build
    - sudo -E ./build-mate.sh ${ARCH}
    
    # 4. Generate checksums
    - cd ${OUTPUT_DIR}
    - sha256sum AcreetionOS-MATE-*-${ARCH}.iso > checksums.txt
    - cat checksums.txt
  
  artifacts:
    name: "AcreetionOS-MATE-${ARCH}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${OUTPUT_DIR}/AcreetionOS-MATE-*-${ARCH}.iso
      - ${OUTPUT_DIR}/checksums.txt
      - ${OUTPUT_DIR}/*.sha256
    expire_in: 30 days
  
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  
  only:
    - tags
    - schedules
    - web
    - merge_requests

# Release job - runs on tags
release:x86_64:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - docker
  
  needs:
    - job: build:x86_64
      artifacts: true

  script:
    - echo "Creating release for ${CI_COMMIT_TAG}..."
    - |
      ISO_FILE=$(ls ISO/AcreetionOS-MATE-*-${ARCH}.iso | head -n 1)
      ISO_NAME=$(basename $ISO_FILE)
      echo "ISO_FILE=$ISO_FILE"
      echo "ISO_NAME=$ISO_NAME"
  
  release:
    tag_name: "${CI_COMMIT_TAG}"
    description: "AcreetionOS MATE Edition - ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "AcreetionOS MATE ISO (${ARCH})"
          url: "${CI_PROJECT_URL}/-/jobs/${GE_JOB_ID}/artifacts/file/${ISO_FILE}"
  
  only:
    - tags

# Scheduled build notification
scheduled_build:
  stage: build
  image: alpine:latest
  script:
    - echo "Scheduled build triggered at $(date)"
  only:
    - schedules
