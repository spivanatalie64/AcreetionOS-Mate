name: Build AcreetionOS MATE ISO

on:
  # Trigger on schedule (weekly)
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at 00:00 UTC
  
  # Trigger on upstream AcreetionOS releases
  repository_dispatch:
    types: [upstream-release]
  
  # Manual trigger via workflow_dispatch
  workflow_dispatch:
    inputs:
      build_reason:
        description: 'Reason for manual build'
        required: false
        default: 'Manual build'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    strategy:
      matrix:
        arch: [x86_64]
        exclude:
          # Placeholder for future multi-arch support
          - arch: ''
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Checkout submodules
        run: git submodule update --init --recursive
      
      - name: Set up build environment
        run: |
          # Update system packages
          sudo apt-get update
          sudo apt-get install -y \
            arch-install-scripts \
            dosfstools \
            grub-efi-amd64-signed \
            grub-pc-bin \
            mtools \
            parted \
            libarchive-tools \
            bc \
            p7zip-full
          
          # Install Arch Linux bootstrap
          sudo pacman-key --init
          sudo pacman-key --populate archlinux
      
      - name: Get version info
        id: version
        run: |
          # Get latest tag from this repo or use date
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "nightly-$(date +%Y%m%d)")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "iso_name=AcreetionOS-MATE-${VERSION}-${{ matrix.arch }}.iso" >> $GITHUB_OUTPUT
          echo "Build version: ${VERSION}"
      
      - name: Generate build metadata
        run: |
          mkdir -p airootfs/etc
          cat > airootfs/etc/acreetion-build-info <<EOF
          BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          BUILD_COMMIT=$(git rev-parse HEAD)
          BUILD_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          BUILD_VERSION=${{ steps.version.outputs.version }}
          BUILD_SYSTEM=GitHub Actions
          BUILD_RUNNER=${{ runner.os }}
          EOF
      
      - name: Build ISO
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          chmod +x ./build-mate.sh
          sudo -E ./build-mate.sh ${{ matrix.arch }}
      
      - name: Generate checksums
        run: |
          cd ../ISO
          sha256sum AcreetionOS-MATE-*-${{ matrix.arch }}.iso > AcreetionOS-MATE-*-${{ matrix.arch }}.iso.sha256
          cat AcreetionOS-MATE-*-${{ matrix.arch }}.iso.sha256
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ../ISO/AcreetionOS-MATE-*-${{ matrix.arch }}.iso
            ../ISO/AcreetionOS-MATE-*-${{ matrix.arch }}.iso.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts (scheduled/manual builds)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v3
        with:
          name: acreetionos-mate-${{ matrix.arch }}-${{ github.run_number }}
          path: |
            ../ISO/AcreetionOS-MATE-*-${{ matrix.arch }}.iso
            ../ISO/AcreetionOS-MATE-*-${{ matrix.arch }}.iso.sha256
          retention-days: 30
      
      - name: Clean up build artifacts
        if: always()
        run: |
          echo "Cleanup step for build environment"
          # Note: GitHub Actions will clean up the runner automatically
