name: Validate & Trigger ISO Build

on:
  schedule:
    - cron: '0 0 */5 * *'  # Every 5 days at 00:00 UTC
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:
    inputs:
      build_reason:
        description: 'Reason for manual build'
        required: false
        default: 'Manual build'
      gitlab_ref:
        description: 'GitLab branch/tag to build (default: main)'
        required: false
        default: 'main'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Security gate - Package validation
        run: |
          chmod +x ./validate-build.sh
          ./validate-build.sh

          if grep -q "cinnamon\|nemo\|muffin\|gnome-terminal" packages.x86_64; then
            echo "SECURITY: Found conflicting packages (Cinnamon/GNOME)"
            exit 1
          fi
          echo "Security validation passed"

  trigger-gitlab-build:
    needs: validate
    runs-on: ubuntu-latest
    env:
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      GITLAB_HOST: gitlab.acreetionos.org
      GLAB_VERSION: "1.49.0"
    steps:
      - name: Install glab
        run: |
          set -euo pipefail
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64|amd64) GLAB_ARCH=amd64 ;;
            aarch64|arm64) GLAB_ARCH=arm64 ;;
            *) echo "Unsupported architecture: $ARCH" >&2 ; exit 1 ;;
          esac
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://gitlab.com/gitlab-org/cli/-/releases/v${GLAB_VERSION}/downloads/glab_${GLAB_VERSION}_linux_${GLAB_ARCH}.tar.gz" \
            | tar xz -C "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          glab version

      - name: Trigger ISO build on gitlab.acreetionos.org
        run: |
          REF="${{ github.event.inputs.gitlab_ref || 'main' }}"
          glab ci run \
            --hostname gitlab.acreetionos.org \
            --repo "${{ secrets.GITLAB_PROJECT }}" \
            --branch "$REF" \
            --variables "TRIGGERED_BY=github-actions,GH_SHA=${{ github.sha }},GH_RUN_ID=${{ github.run_id }}"
